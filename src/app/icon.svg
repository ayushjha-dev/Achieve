<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Deep dark green background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F2318;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1E3A2F;stop-opacity:1"/>
    </linearGradient>
    <!-- Terracotta glow for React orbits -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)"/>

  <!-- Subtle inner border -->
  <rect x="12" y="12" width="488" height="488" rx="92" fill="none" stroke="#C85A32" stroke-width="2" opacity="0.25"/>

  <!-- ── React Atom Orbits (centered at 256, 210) ── -->
  <!-- Orbit 1: horizontal -->
  <ellipse cx="256" cy="210" rx="118" ry="42"
    fill="none" stroke="#C85A32" stroke-width="11" stroke-linecap="round"
    filter="url(#glow)" opacity="0.95"/>

  <!-- Orbit 2: rotated 60° -->
  <ellipse cx="256" cy="210" rx="118" ry="42"
    fill="none" stroke="#C85A32" stroke-width="11" stroke-linecap="round"
    transform="rotate(60 256 210)"
    filter="url(#glow)" opacity="0.95"/>

  <!-- Orbit 3: rotated -60° -->
  <ellipse cx="256" cy="210" rx="118" ry="42"
    fill="none" stroke="#C85A32" stroke-width="11" stroke-linecap="round"
    transform="rotate(-60 256 210)"
    filter="url(#glow)" opacity="0.95"/>

  <!-- Nucleus glow halo -->
  <circle cx="256" cy="210" r="28" fill="#C85A32" opacity="0.12"/>
  <!-- Nucleus dot -->
  <circle cx="256" cy="210" r="16" fill="#FAF9F5"/>
  <!-- Tiny inner dot -->
  <circle cx="256" cy="210" r="6" fill="#C85A32"/>

  <!-- ── Git Branch (centered below, y=345) ── -->
  <!-- Main node top -->
  <circle cx="256" cy="345" r="10" fill="#FAF9F5" opacity="0.9"/>
  <!-- Stem down -->
  <line x1="256" y1="355" x2="256" y2="380" stroke="#FAF9F5" stroke-width="8" stroke-linecap="round" opacity="0.75"/>
  <!-- Left branch line -->
  <line x1="256" y1="380" x2="204" y2="440" stroke="#FAF9F5" stroke-width="8" stroke-linecap="round" opacity="0.65"/>
  <!-- Right branch line -->
  <line x1="256" y1="380" x2="308" y2="440" stroke="#FAF9F5" stroke-width="8" stroke-linecap="round" opacity="0.65"/>
  <!-- Branch end nodes -->
  <circle cx="204" cy="448" r="10" fill="#C85A32" opacity="0.9"/>
  <circle cx="308" cy="448" r="10" fill="#C85A32" opacity="0.9"/>

  <!-- Divider line between react and git parts -->
  <line x1="148" y1="318" x2="364" y2="318" stroke="#FAF9F5" stroke-width="1.5" opacity="0.12"/>
</svg>
